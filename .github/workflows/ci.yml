name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  engine:
    name: Engine (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: engine/go.sum
      - name: golangci-lint (incl. depguard architecture rules)
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: engine
      - name: Builtin rules in sync with /rules
        run: |
          go run ./tools/syncrules
          git diff --exit-code -- internal/rules/builtin || {
            echo "::error::embedded builtin rules drifted from /rules — run 'make rules-sync' and commit"; exit 1; }
      - name: Test
        run: go test -race ./...
      - name: Build
        run: CGO_ENABLED=0 go build -trimpath -o bin/argus ./cmd/argus

  plugin:
    name: Plugin (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: plugin/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: plugin/go.sum
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test:ci
      - name: Build frontend
        run: npm run build
      - name: Build backend
        run: go build ./...

  dogfood:
    name: Dogfood gate (argus scores itself)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: engine/go.sum
      - name: Build
        run: CGO_ENABLED=0 go build -trimpath -o argus ./cmd/argus
      - name: Score the engine's own telemetry (gate at 85)
        run: |
          # One argus scores another: the scorer listens, the subject serves
          # with OTLP self-export pointed at the scorer. Master plan §3.4 —
          # Argus must pass its own rules, and this is where that's enforced.
          ./argus score --listen-otlp 127.0.0.1:4319 --window 60s \
            --fail-below-score 85 \
            --spec-version-file ../.instrumentation-score-version \
            --out dogfood-report.md &
          SCORE_PID=$!
          sleep 2
          OTEL_EXPORTER_OTLP_ENDPOINT=http://127.0.0.1:4319 ARGUS_ENVIRONMENT=ci \
            ./argus serve --addr 127.0.0.1:8099 --otlp-grpc 127.0.0.1:4320 \
            --score-interval 3s &
          SERVE_PID=$!
          set +e
          wait "$SCORE_PID"; RC=$?
          set -e
          kill "$SERVE_PID" 2>/dev/null || true
          echo "--- dogfood report ---"
          cat dogfood-report.md
          exit "$RC"

  helm:
    name: Helm chart lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: helm lint
        run: |
          helm dependency update deploy/helm/argus
          helm lint deploy/helm/argus
          helm template argus deploy/helm/argus >/dev/null
