# Argus incident registry — ground truth for Module B (Backtest).
# Master plan §3.2: user-labeled past incidents; §9 Phase 0: log EVERY induced fault,
# chaos experiment, and real incident from day one so Phase 3 has real data.
#
# Schema (v1):
#   id:               unique slug, convention: YYYY-MM-DD-<short-name>
#   title:            human-readable one-liner
#   start / end:      RFC 3339 UTC timestamps of impact window
#   services:         affected service.name values
#   expected_alerts:  (optional) alert rule names that SHOULD have fired
#   induced:          (optional) true if caused by chaos/fault injection
#   fault:            (optional) path to the fault manifest used
#   notes:            (optional) free text
#
# Example:
# - id: 2026-07-15-checkout-cardinality
#   title: "Cardinality explosion in checkout (chaos-mesh induced)"
#   start: "2026-07-15T14:00:00Z"
#   end:   "2026-07-15T14:25:00Z"
#   services: [checkout]
#   expected_alerts: [MimirIngesterSeriesLimit]
#   induced: true
#   fault: scenarios/faults/cardinality-explosion.yaml
#   notes: "First logged incident of the history-accumulation track."

version: 1
incidents:
  - id: 2026-07-18-adfailure-baseline-2
    title: "adFailure ON — fidelity-spike baseline re-run (first baseline lost with WAL)"
    start: "2026-07-18T05:16:23Z"
    end:   "2026-07-18T05:29:31Z"
    services: [ad]
    expected_alerts: [SpanErrorRatioInstant, HighSpanErrorRatio]
    induced: true
    fault: scenarios/faults/toggle-flag.sh
    notes: >-
      Flag on 05:16:13Z, ad restarted immediately (stale-flagd-stream lesson
      from the first run). Live: instant twin firing from 05:18Z samples,
      for:5m firing 05:23-05:35Z. Replayed same window both modes: direct
      -1 step vs live, synthesized matches live, for: exact everywhere, no
      missed/extra firings. Post-fault flapping at the 1% threshold continued
      past 05:45Z (ad-restart EventStream noise) — end time here is the
      fault-off toggle; telemetry-visible impact ran longer, as measured and
      expected (see docs/backtest-fidelity.md).
  - id: 2026-07-16-adfailure-spike-baseline
    title: "adFailure ON for the Phase 3 fidelity-spike alert baseline (first live for:-divergence measurement)"
    start: "2026-07-16T21:16:00Z"
    end:   "2026-07-16T21:30:05Z"
    services: [ad]
    expected_alerts: [SpanErrorRatioInstant, HighSpanErrorRatio]
    induced: true
    fault: scenarios/faults/toggle-flag.sh
    notes: >-
      First incident with live ruler rules running (deploy/kind/mimir-rules).
      Flag patched ON 21:05Z but the ad service's flagd stream was stale from
      the flagd restart — fault effective only after an ad rollout ~21:16Z.
      adFailure errors ~1/10 of GetAds (~2 error spans per 5m window): sparse
      signal, thresholds at 5% and 2% flapped (fired 21:21:04Z / resolved
      21:22:36Z), settled at 1% + load-generator scaled 3x during the window.
      SpanErrorRatioInstant (for:0) fired per service 21:24:05-21:27:05Z;
      HighSpanErrorRatio (for:5m) fired exactly +5m (accounting 21:29:05Z).
      Ruler group reload at 21:26:06Z RESET pending for:-clocks (ad's pending
      from ~21:19 wiped) — rule edits destroy live alert state mid-incident.
  - id: 2026-07-12-adfailure-toggle-test
    title: "adFailure feature flag ON — flagd fault-injection mechanism verification"
    start: "2026-07-12T03:02:39Z"
    end:   "2026-07-12T03:03:29Z"
    services: [ad]
    induced: true
    fault: scenarios/faults/toggle-flag.sh
    notes: >-
      Verified the ConfigMap-based flag toggle path Phase 4 depends on
      (patch flagd-config + flagd rollout restart; ~30s propagation).
      ad service returned errors for ~50s.
  - id: 2026-07-11-flagd-ui-oomkill
    title: "flagd-ui sidecar OOMKilled in CrashLoopBackOff at chart-default 250Mi limit"
    start: "2026-07-11T22:39:00Z"
    end:   "2026-07-11T23:10:00Z"
    services: [flagd]
    induced: false
    notes: >-
      First boot of the dev cluster. flagd container healthy throughout; the
      flagd-ui sidecar OOMKilled continuously regardless of limit (250Mi
      default, 512Mi, 1Gi — runaway allocation), so the sidecar was removed
      from deploy/kind/values/otel-demo.yaml. Visible in Loki (flagd restarts)
      and Mimir (kube restart counters) — first entry of the
      history-accumulation track.
