site_name: Argus
site_description: "CI for reliability — score, price, backtest, and prove your observability."
repo_url: https://github.com/tamen25/Argus
repo_name: tamen25/Argus

theme:
  name: material
  palette:
    - scheme: default
      toggle: {icon: material/weather-night, name: Dark mode}
    - scheme: slate
      toggle: {icon: material/weather-sunny, name: Light mode}
  features:
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - History durability: history-durability.md
  - Soak testing: soak.md
  - Making the thresholds yours: making-thresholds-yours.md
  - Cost & showback: cost.md
  - Backtest fidelity (spike): backtest-fidelity.md
  - Grafana plugin: plugin.md
  - CLI:
      - score: cli/score.md
      - remediate: cli/remediate.md
      - cost: cli/cost.md
      - backtest: cli/backtest.md
      - mcp: cli/mcp.md
      - devtools: cli/devtools.md
  - Rules:
      - Authoring: rules/authoring.md
      - RES-005: rules/res-005.md
      - MET-001: rules/met-001.md
      - MET-002: rules/met-002.md
      - MET-004: rules/met-004.md
      - MET-005: rules/met-005.md
      - SPA-002: rules/spa-002.md
      - SPA-003: rules/spa-003.md
      - SPA-004: rules/spa-004.md
      - LOG-001: rules/log-001.md
      - LOG-002: rules/log-002.md
      - ARG-RES-001: rules/arg-res-001.md
      - ARG-SPA-002: rules/arg-spa-002.md
      - ARG-LOG-001: rules/arg-log-001.md
      - ARG-RES-002: rules/arg-res-002.md
      - ARG-RES-003: rules/arg-res-003.md
      - ARG-RES-004: rules/arg-res-004.md
      - ARG-MET-001: rules/arg-met-001.md
      - ARG-MET-002: rules/arg-met-002.md
  - Master build plan: argus-master-build-plan.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - tables
