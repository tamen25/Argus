groups:
  - name: argus-spike
    interval: 1m
    rules:
      - record: service:http_errors:rate5m
        expr: sum by (service_name) (rate(http_server_errors_total[5m]))
      - alert: HighErrorRate
        expr: service:http_errors:rate5m > 0.05
        for: 10m
        labels:
          severity: page
        annotations:
          summary: "High HTTP error rate on {{ $labels.service_name }}"
      - alert: PodRestartStorm
        expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
        for: 5m
        labels:
          severity: ticket
