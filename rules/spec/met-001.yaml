# Implements spec rule MET-001 (rules/spec/upstream/MET-001.md): metric
# attributes have bound cardinality — fewer than 10,000 unique values per
# attribute key, aggregated by metric name, within a 1-hour window.
# Master-plan rule 2. Cardinality is estimated by HyperLogLog sketches on the
# sampled stream (never exact sets) and can be verified by the Mimir
# cardinality API.
schema: argus.rules/v1
id: MET-001
source: spec
name: metric attributes have bound cardinality
description: >-
  Attribute keys on metrics, aggregated by metric name, MUST have fewer than
  10,000 unique values within a 1-hour window. High-cardinality attributes
  explode active series, degrading query performance and driving storage cost.
target: metric
impact: important
evaluation:
  mode: aggregate
  aggregate: metric_attribute_cardinality
  criteria: "agg.cardinality < params.max_cardinality"
params:
  max_cardinality: 10000
  window: 1h
confidence:
  poller: mimir_label_cardinality
remediation:
  template: high-cardinality-attribute
calibration:
  param: max_cardinality
  source: aggregate
  aggregate: metric_attribute_cardinality
  field: cardinality
  kind: count
