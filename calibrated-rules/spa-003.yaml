# Calibrated override for SPA-003 — generated by `argus rules calibrate`.
# Only params.max_span_names changed (200 -> 56, kind=count, n=187). Criteria untouched.
# Review, then use with: argus score --rules <this dir>
schema: argus.rules/v1
id: SPA-003
source: spec
name: span names have bound cardinality
description: Distinct span names per service MUST stay bounded. Span-name explosion (raw URLs, IDs in names) destroys latency breakdowns and blows up span-metrics pipelines.
target: span
impact: important
evaluation:
    mode: aggregate
    aggregate: span_name_cardinality
    criteria: agg.cardinality < params.max_span_names
params:
    max_span_names: 56
remediation:
    template: unbounded-span-name
calibration:
    param: max_span_names
    source: aggregate
    aggregate: span_name_cardinality
    field: cardinality
    kind: count
