# Calibrated override for ARG-LOG-001 — generated by `argus rules calibrate`.
# Only params.service_violation.threshold_ratio changed (0.50 -> 1, kind=ratio, n=4). Criteria untouched.
# Review, then use with: argus score --rules <this dir>
schema: argus.rules/v1
id: ARG-LOG-001
source: argus
name: logs carry trace correlation
description: Request-path log records SHOULD carry a trace_id. Uncorrelated logs cannot be joined to traces, forcing grep-based investigation during incidents.
target: log
impact: important
evaluation:
    mode: item
    criteria: log.has_trace_id == true
service_violation:
    threshold_ratio: 1
remediation:
    template: logs-without-trace-context
calibration:
    param: service_violation.threshold_ratio
    source: finding_ratio
    kind: ratio
