# Calibrated override for MET-001 — generated by `argus rules calibrate`.
# Only params.max_cardinality changed (10000 -> 60, kind=count, n=6887). Criteria untouched.
# Review, then use with: argus score --rules <this dir>
schema: argus.rules/v1
id: MET-001
source: spec
name: metric attributes have bound cardinality
description: Attribute keys on metrics, aggregated by metric name, MUST have fewer than 10,000 unique values within a 1-hour window. High-cardinality attributes explode active series, degrading query performance and driving storage cost.
target: metric
impact: important
evaluation:
    mode: aggregate
    aggregate: metric_attribute_cardinality
    criteria: agg.cardinality < params.max_cardinality
params:
    max_cardinality: 60
    window: 1h
confidence:
    poller: mimir_label_cardinality
remediation:
    template: high-cardinality-attribute
calibration:
    param: max_cardinality
    source: aggregate
    aggregate: metric_attribute_cardinality
    field: cardinality
    kind: count
