# Calibrated override for ARG-RES-004 — generated by `argus rules calibrate`.
# Only params.max_values changed (3 -> 2, kind=small_count, n=209). Criteria untouched.
# Review, then use with: argus score --rules <this dir>
schema: argus.rules/v1
id: ARG-RES-004
source: argus
name: resource attributes are consistent per service
description: A service SHOULD NOT report many conflicting values for identity resource attributes (service.version, deployment.environment.name, telemetry.sdk.language) within a window — a symptom of broken resource detection or two pipelines writing as one service.
target: resource
impact: normal
evaluation:
    mode: aggregate
    aggregate: resource_attr_cardinality
    criteria: agg.cardinality <= params.max_values
params:
    max_values: 2
remediation:
    template: missing-resource-attributes
calibration:
    param: max_values
    source: aggregate
    aggregate: resource_attr_cardinality
    field: cardinality
    kind: small_count
