# Calibrated override for SPA-002 — generated by `argus rules calibrate`.
# Only params.max_orphan_ratio changed (0.10 -> 1, kind=ratio, n=34). Criteria untouched.
# Review, then use with: argus score --rules <this dir>
schema: argus.rules/v1
id: SPA-002
source: spec
name: traces do not contain orphan spans
description: Any span referencing a parent_span_id MUST have that parent present in the same trace. Orphan spans indicate broken context propagation — the single biggest killer of trace-based diagnosis.
target: span
impact: normal
evaluation:
    mode: aggregate
    aggregate: trace_health
    criteria: agg.orphan_ratio <= params.max_orphan_ratio
params:
    max_orphan_ratio: 1
remediation:
    template: broken-context-propagation
calibration:
    param: max_orphan_ratio
    source: aggregate
    aggregate: trace_health
    field: orphan_ratio
    kind: ratio
