# Calibrated override for ARG-SPA-002 — generated by `argus rules calibrate`.
# Only params.max_missing_root_ratio changed (0.20 -> 1, kind=ratio, n=34). Criteria untouched.
# Review, then use with: argus score --rules <this dir>
schema: argus.rules/v1
id: ARG-SPA-002
source: argus
name: traces have a root span
description: Traces SHOULD contain a root span (a span without a parent). Rootless traces cannot be anchored in time or entry point, making end-to-end latency attribution impossible.
target: span
impact: normal
evaluation:
    mode: aggregate
    aggregate: trace_health
    criteria: agg.missing_root_ratio <= params.max_missing_root_ratio
params:
    max_missing_root_ratio: 1
remediation:
    template: broken-context-propagation
calibration:
    param: max_missing_root_ratio
    source: aggregate
    aggregate: trace_health
    field: missing_root_ratio
    kind: ratio
