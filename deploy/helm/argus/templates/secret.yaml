{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "argus.fullname" .) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "argus.fullname" . }}
  labels: {{- include "argus.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.engine.apiToken }}
  api-token: {{ .Values.engine.apiToken | b64enc | quote }}
  {{- else if $existing }}
  {{/* keep the token generated on a previous install */}}
  api-token: {{ index $existing.data "api-token" | quote }}
  {{- else }}
  api-token: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
