# Argus engine on the dev cluster: OTLP receiver for the Alloy sampled
# mirror + /metrics + /api/report + /api/aggregates. Read-only by design —
# no credentials, no write paths (architecture rule 5).
#
# Image is built and loaded by scripts/soak.sh (or manually):
#   docker build -t argus-engine:dev --build-arg SPEC_VERSION=$(cat .instrumentation-score-version) engine/
#   kind load docker-image argus-engine:dev --name argus
apiVersion: v1
kind: Namespace
metadata:
  name: argus
---
# Dev pricing for the /api/cost showback endpoint. Modeled rates — see
# pricing/aws.yaml; calibrate to your own infra spend before trusting numbers.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argus-pricing
  namespace: argus
data:
  pricing.yaml: |
    schema: argus.pricing/v1
    currency: USD
    ingest:
      per_gb: 0.35
      per_gb_by_signal:
        logs: 0.30
        metrics: 0.35
        traces: 0.40
    active_series:
      per_million: 8.00
    storage:
      per_gb_month_by_class:
        STANDARD: 0.023
        STANDARD_IA: 0.0125
        GLACIER_IR: 0.004
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-engine
  namespace: argus
  labels: {app: argus-engine}
spec:
  replicas: 1
  selector:
    matchLabels: {app: argus-engine}
  template:
    metadata:
      labels: {app: argus-engine}
    spec:
      containers:
        - name: engine
          image: argus-engine:dev
          imagePullPolicy: Never # kind-loaded local image
          args:
            - serve
            - --addr=:8080
            - --otlp-grpc=:4317
            # Dev-cluster feedback loop: trace-derived aggregates (service
            # graph edges, trace health) only surface after a completed
            # window generation — 15m shows them fast. Soak/production use
            # the 1h default.
            - --cardinality-window=15m
            # Cost showback (Phase 2): active-series cost from Mimir, log-bytes
            # from Loki. Storage (S3/MinIO) needs bucket creds — left off dev.
            - --cost-pricing=/etc/argus/pricing.yaml
            - --cost-mimir-url=http://mimir-gateway.lgtm.svc
            - --cost-loki-url=http://loki-gateway.lgtm.svc
          volumeMounts:
            - {name: pricing, mountPath: /etc/argus, readOnly: true}
          ports:
            - {name: http, containerPort: 8080}
            - {name: otlp-grpc, containerPort: 4317}
          readinessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests: {cpu: 100m, memory: 96Mi}
            # Bounded-memory rule 3: the soak run must stay flat well under
            # this ceiling; an OOMKill here is a failed soak, not an ops issue.
            limits: {cpu: "1", memory: 256Mi}
      volumes:
        - name: pricing
          configMap: {name: argus-pricing}
---
apiVersion: v1
kind: Service
metadata:
  name: argus-engine
  namespace: argus
  labels: {app: argus-engine}
spec:
  selector: {app: argus-engine}
  ports:
    - {name: http, port: 8080, targetPort: http}
    - {name: otlp-grpc, port: 4317, targetPort: otlp-grpc}
