# kind cluster config for the Argus dev environment (Phase 0).
# Host port mappings (via NodePort services):
#   3000 -> Grafana        (nodePort 30300)
#   4317 -> Alloy OTLP/gRPC (nodePort 30317)
#   4318 -> Alloy OTLP/HTTP (nodePort 30318)
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: argus
nodes:
  - role: control-plane
    # Durable telemetry history (master plan §9): MinIO's data dir lives on the
    # WSL host filesystem, so Mimir blocks survive cluster deletion/recreation.
    # bootstrap.sh creates the host dir; teardown.sh never touches it.
    extraMounts:
      - hostPath: /var/lib/argus/history
        containerPath: /data/argus-history
    extraPortMappings:
      # TEMP (2026-07-17): host 13000, not 3000 — the otel-compare cluster
      # holds 3000 while both run side by side. Revert when it's gone.
      # (Matches the RUNNING argus cluster's mapping — do not commit.)
      - containerPort: 30300
        hostPort: 13000
        protocol: TCP
      - containerPort: 30317
        hostPort: 4317
        protocol: TCP
      - containerPort: 30318
        hostPort: 4318
        protocol: TCP
