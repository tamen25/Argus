# Alloy (grafana/alloy chart) — OTLP gateway for the cluster.
# Receives OTLP from otel-demo (and anything else), fans out to Mimir/Loki/Tempo,
# plus the Phase 1 sampled mirror to argus-engine. Argus is never in the
# critical path: the mirror is a separate exporter with its own queue; if the
# engine is down, Alloy retries and drops mirror data only.
alloy:
  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
  configMap:
    content: |-
      otelcol.receiver.otlp "default" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        http {
          endpoint = "0.0.0.0:4318"
        }
        output {
          metrics = [otelcol.processor.batch.default.input]
          logs    = [otelcol.processor.batch.default.input]
          traces  = [otelcol.processor.batch.default.input]
        }
      }

      otelcol.processor.batch "default" {
        output {
          metrics = [otelcol.exporter.prometheus.mimir.input, otelcol.exporter.otlp.argus.input]
          logs    = [otelcol.exporter.loki.default.input, otelcol.exporter.otlp.argus.input]
          traces  = [otelcol.exporter.otlp.tempo.input, otelcol.exporter.otlp.argus.input]
        }
      }

      otelcol.exporter.prometheus "mimir" {
        forward_to = [prometheus.remote_write.mimir.receiver]
      }

      prometheus.remote_write "mimir" {
        endpoint {
          url = "http://mimir-gateway.lgtm.svc/api/v1/push"
        }
      }

      otelcol.exporter.loki "default" {
        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki-gateway.lgtm.svc/loki/api/v1/push"
        }
      }

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo.lgtm.svc:4317"
          tls {
            insecure = true
          }
        }
      }

      // Phase 1 mirror to argus-engine. Full mirror on the dev cluster
      // (volume is tiny); production guidance adds
      // otelcol.processor.probabilistic_sampler in front of this exporter.
      otelcol.exporter.otlp "argus" {
        client {
          endpoint = "argus-engine.argus.svc:4317"
          tls {
            insecure = true
          }
        }
      }
