# Grafana (grafana/grafana chart) — reachable at http://localhost:3000 via kind
# extraPortMapping (nodePort 30300).
adminUser: admin
adminPassword: argus-dev

service:
  type: NodePort
  nodePort: 30300

grafana.ini:
  plugins:
    # Argus plugin loads unsigned during development (Phase 1+).
    allow_loading_unsigned_plugins: tamen25-argus-app

# The built Argus app plugin, copied onto the kind node:
#   cd plugin && npm run build
#   GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o dist/gpx_argus_linux_amd64 ./pkg
#   docker exec argus-control-plane mkdir -p /var/lib/argus/plugins
#   docker cp plugin/dist argus-control-plane:/var/lib/argus/plugins/tamen25-argus-app
extraVolumes:
  - name: argus-plugin
    hostPath:
      path: /var/lib/argus/plugins
extraVolumeMounts:
  - name: argus-plugin
    mountPath: /var/lib/grafana/plugins
    readOnly: true

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Mimir
        type: prometheus
        uid: mimir
        access: proxy
        url: http://mimir-gateway.lgtm.svc/prometheus
        isDefault: true
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki-gateway.lgtm.svc
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo.lgtm.svc:3200
