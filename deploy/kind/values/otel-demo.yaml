# OpenTelemetry Demo — workload only. Built-in backends disabled; all telemetry
# goes to Alloy in the lgtm namespace, which fans out to Mimir/Loki/Tempo.
default:
  envOverrides:
    # Demo services derive OTEL_EXPORTER_OTLP_ENDPOINT from this hostname.
    - name: OTEL_COLLECTOR_NAME
      value: alloy.lgtm

components:
  flagd:
    # flagd-ui sidecar disabled: it OOMKills within seconds regardless of limit
    # (tested 250Mi default, 512Mi, 1Gi) on this cluster — runaway allocation,
    # not sizing. It is only the flag-editing web UI; flagd itself serves flags
    # fine. Phase 4 fault injection edits the flagd ConfigMap directly.
    # (frontend-proxy's /feature route will 503 — harmless.) See DECISIONS.md.
    sidecarContainers: []

opentelemetry-collector:
  enabled: false
jaeger:
  enabled: false
prometheus:
  enabled: false
grafana:
  enabled: false
opensearch:
  enabled: false
