# Mimir (grafana/mimir-distributed) — minimal single-replica footprint for kind.
#
# HISTORY ACCUMULATION (master plan §9, Phase 0): blocks retention is 365d so
# Module B (Backtest) has months of real metric history by Phase 3. Do not
# lower this on the dev cluster; disk cost is the point.
mimir:
  structuredConfig:
    multitenancy_enabled: false
    limits:
      compactor_blocks_retention_period: 365d
      # otel-demo emits modest cardinality; generous ceiling for chaos scenarios
      max_global_series_per_user: 1000000
      ingestion_rate: 100000
    ingester:
      ring:
        replication_factor: 1
    querier:
      # Ingesters are empty after a cluster recreation (WAL is transient by
      # design); route anything older than 2h to the store-gateway so restored
      # blocks are immediately queryable. Default (12h) would hide restored
      # history for hours after a recreate.
      query_store_after: 2h
    blocks_storage:
      bucket_store:
        # Must be < query_store_after: by default (10h) the store-gateway
        # refuses to load fresh blocks on the assumption ingesters serve them —
        # not true for restored history on a recreated cluster.
        ignore_blocks_within: 1h

alertmanager:
  enabled: false
overrides_exporter:
  enabled: false
rollout_operator:
  enabled: false

# NOTE: query_scheduler must stay enabled — mimir-distributed 6.x queriers are
# hard-wired to the scheduler's headless service; disabling it hangs all queries.
query_scheduler:
  replicas: 1

ruler:
  replicas: 1

distributor:
  replicas: 1
ingester:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    size: 10Gi
store_gateway:
  replicas: 1
  zoneAwareReplication:
    enabled: false
compactor:
  replicas: 1
  persistentVolume:
    size: 5Gi
querier:
  replicas: 1
query_frontend:
  replicas: 1

# Object storage for blocks: in-cluster MinIO (also exercises the S3 code path
# the A2 cost engine will use in Phase 2). Data lives on the argus-history
# static PVC (hostPath -> WSL filesystem) so blocks survive cluster recreation.
minio:
  enabled: true
  persistence:
    existingClaim: argus-history

nginx:
  replicas: 1
