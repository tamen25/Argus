# Loki (grafana/loki chart) — single binary, filesystem storage, long retention
# (0s = keep everything; history accumulation, master plan §9).
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  limits_config:
    retention_period: 0s

singleBinary:
  replicas: 1
  persistence:
    size: 20Gi

# Zero out the scalable-mode deployments.
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

gateway:
  enabled: true

# Dev cluster: no self-monitoring sidecars/caches.
lokiCanary:
  enabled: false
test:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false
