# NodePort service exposing Alloy's OTLP receivers on the kind host
# (kind-config.yaml maps host 4317/4318 -> nodePorts 30317/30318).
apiVersion: v1
kind: Service
metadata:
  name: alloy-otlp-nodeport
  namespace: lgtm
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/instance: alloy
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      nodePort: 30317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      nodePort: 30318
      protocol: TCP
